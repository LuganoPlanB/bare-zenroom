name: Prebuild
on:
  workflow_dispatch:
env:
  ZENROOM_GIT_URL: https://github.com/dyne/zenroom.git
jobs:
  prebuild:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: x64
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: x64
          - os: ubuntu-24.04
            platform: android
            arch: ia32
          - os: ubuntu-24.04
            platform: android
            arch: arm64
          - os: ubuntu-24.04
            platform: android
            arch: arm
          - os: macos-14
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
          - os: macos-14
            platform: ios
            arch: arm64
            tags: -simulator
            flags: --simulator
          - os: macos-14
            platform: ios
            arch: x64
            tags: -simulator
            flags: --simulator
          - os: windows-2022
            platform: win32
            arch: x64
    runs-on: ${{ matrix.os }}
    name: Build / ${{ matrix.platform }}-${{ matrix.arch }}${{ matrix.tags }}
    steps:
      - uses: holepunchto/actions/bare-base@v1
      - uses: msys2/setup-msys2@v2
        if: matrix.platform == 'win32' && matrix.arch == 'x64'
        with:
          release: false
          update: true
          install: >-
            make
            patch
            diffutils
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-gcc
      - name: Clone Zenroom
        shell: bash
        run: |
          if [ ! -d zenroom/.git ]; then
            git clone "$ZENROOM_GIT_URL" zenroom
          fi
      - name: Build Zenroom
        run: npm run zenroom:build
      - uses: holepunchto/actions/compile-prebuilds@v1
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          flags: ${{ matrix.flags }}
          tags: ${{ matrix.tags}}
          upload: true
        env:
          BARE_MAKE_PLATFORM: ${{ matrix.platform == 'win32' && 'mingw' || '' }}
  merge:
    runs-on: ubuntu-latest
    needs: prebuild
    name: Merge
    steps:
      - uses: holepunchto/actions/merge-prebuilds@v1
