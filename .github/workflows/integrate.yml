name: Integrate
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  ZENROOM_GIT_URL: https://github.com/dyne/zenroom.git
jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: holepunchto/actions/node-base@v1
      - run: npm run lint
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
    runs-on: ${{ matrix.os }}
    name: Test / ${{ matrix.platform }}-${{ matrix.arch }}
    steps:
      - uses: holepunchto/actions/bare-base@v1
      - name: Clone Zenroom
        shell: bash
        run: |
          if [ ! -d zenroom/.git ]; then
            git clone "$ZENROOM_GIT_URL" zenroom
          fi
      - name: Build Zenroom
        run: npm run zenroom:build
      - uses: holepunchto/actions/compile-prebuilds@v1
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          flags: --debug
      - run: npm test
